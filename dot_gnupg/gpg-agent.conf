# Enable SSH support
enable-ssh-support

# Grab keyboard for pinentry
grab

# Pinentry program (macOS)
# Uses Nix profile path - adjust if using Homebrew
pinentry-program /etc/profiles/per-user/I544489/bin/pinentry-mac

# Cache settings (optional - uncomment to customize)
# default-cache-ttl 600
# max-cache-ttl 7200
